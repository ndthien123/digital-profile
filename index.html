<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Profile - Nguyễn Thiện</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 30px;
            border: 5px solid #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .position {
            font-size: 18px;
            color: #667eea;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: #667eea;
            margin: 20px auto 30px;
        }

        .bio {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .facebook {
            background: #1877F2;
            color: white;
        }

        .facebook:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(24, 119, 242, 0.4);
        }

        .zalo {
            background: #0084FF;
            color: white;
        }

        .zalo:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 132, 255, 0.4);
        }

        .linkedin {
            background: #0A66C2;
            color: white;
        }

        .linkedin:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(10, 102, 194, 0.4);
        }

        .gift-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            width: 100%;
            max-width: 300px;
        }

        .gift-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .gift-btn:active {
            transform: translateY(-1px);
        }

        /* Fireworks styles */
        .firework {
            position: fixed;
            pointer-events: none;
            font-size: 30px;
            z-index: 9999;
        }

        @keyframes fireworkBurst {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        .firework.burst {
            animation: fireworkBurst 0.8s ease-out forwards;
        }

        /* Message Form styles */
        .message-form {
            background: #f8f9ff;
            padding: 25px;
            border-radius: 15px;
            margin-top: 30px;
            border: 2px solid #667eea;
        }

        .form-title {
            font-size: 18px;
            color: #333;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-submit {
            width: 100%;
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .form-submit:active {
            transform: translateY(0);
        }

        /* Success message styles */
        .success-message {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
            animation: slideIn 0.3s ease;
            z-index: 10000;
            font-weight: 500;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }

        .success-message.hide {
            animation: slideOut 0.3s ease forwards;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            .name {
                font-size: 28px;
            }

            .position {
                font-size: 16px;
            }

            .avatar {
                width: 120px;
                height: 120px;
            }

            .success-message {
                right: 10px;
                left: 10px;
                top: auto;
                bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Avatar -->
        <div class="avatar">
            <img src="https://scontent.fhan15-2.fna.fbcdn.net/v/t39.30808-6/328246681_897454024904086_1701915022116520869_n.jpg?_nc_cat=104&ccb=1-7&_nc_sid=1d70fc&_nc_ohc=9Sx6NaeYk0YQ7kNvwE5Ayb1&_nc_oc=AdqDVkO4rARet7R0ZQu5L355M_xU5H1jtUsf3LVePZXFAuBDe-Id6pK--zacJiY6OkSA1vs6n2l38RtWV7gNbyfl&_nc_zt=23&_nc_ht=scontent.fhan15-2.fna&_nc_gid=WQUpQ7hGm7C3iRWkObouuQ&_nc_ss=7a3a8&oh=00_Af0h6yN6Yep19zoqG7Mp7IRI4xe_E5MqaCuSFBQJ759VQw&oe=69DEAE98" alt="Nguyễn Thiện">
        </div>

        <!-- Name and Position -->
        <h1 class="name">Nguyễn Thiện</h1>
        <p class="position">Trưởng Phòng MKT</p>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Bio -->
        <p class="bio">Chào bạn! Tôi là Trưởng Phòng Marketing với niềm đam mê sáng tạo và chiến lược.</p>

        <!-- Social Media Links -->
        <div class="social-links">
            <a href="https://facebook.com" class="social-btn facebook" title="Facebook">
                <span>f</span>
            </a>
            <a href="https://zalo.me" class="social-btn zalo" title="Zalo">
                <span>Z</span>
            </a>
            <a href="https://linkedin.com" class="social-btn linkedin" title="LinkedIn">
                <span>in</span>
            </a>
        </div>

        <!-- Gift Button -->
        <button class="gift-btn" id="giftBtn">🎁 Tặng Quà</button>

        <!-- Message Form -->
        <div class="message-form">
            <h3 class="form-title">📝 Gửi Lời Nhắn</h3>
            <form id="messageForm">
                <div class="form-group">
                    <label class="form-label">Tên của bạn</label>
                    <input type="text" class="form-input" id="senderName" placeholder="Nhập tên của bạn" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Nội dung lời nhắn</label>
                    <textarea class="form-textarea" id="messageContent" placeholder="Nhập lời nhắn của bạn..." required></textarea>
                </div>
                <button type="submit" class="form-submit">✉️ Gửi Lời Nhắn</button>
            </form>
        </div>
    </div>

    <script>
        const giftBtn = document.getElementById('giftBtn');
        const messageForm = document.getElementById('messageForm');
        
        function createFireworks(event) {
            const button = event.target;
            const buttonRect = button.getBoundingClientRect();
            const centerX = buttonRect.left + buttonRect.width / 2;
            const centerY = buttonRect.top + buttonRect.height / 2;

            const emojis = ['🎉', '🎊', '✨', '🎁', '💝', '🌟', '⭐', '💫', '🎈', '🎀'];
            
            // Create 30 particles
            for (let i = 0; i < 30; i++) {
                const firework = document.createElement('div');
                firework.className = 'firework';
                firework.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                
                // Random angle for burst effect
                const angle = (Math.PI * 2 * i) / 30;
                const velocity = 5 + Math.random() * 8;
                const tx = Math.cos(angle) * velocity * 80;
                const ty = Math.sin(angle) * velocity * 80 - 100;
                
                firework.style.left = centerX + 'px';
                firework.style.top = centerY + 'px';
                firework.style.setProperty('--tx', tx + 'px');
                firework.style.setProperty('--ty', ty + 'px');
                
                document.body.appendChild(firework);
                
                // Trigger animation
                setTimeout(() => {
                    firework.classList.add('burst');
                }, 10);
                
                // Remove element after animation
                setTimeout(() => {
                    firework.remove();
                }, 900);
            }
        }

        giftBtn.addEventListener('click', createFireworks);

        // Handle message form submission
        messageForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const senderName = document.getElementById('senderName').value.trim();
            const messageContent = document.getElementById('messageContent').value.trim();

            if (!senderName || !messageContent) {
                alert('Vui lòng điền đầy đủ thông tin');
                return;
            }

            try {
                // Gửi tin nhắn tới Telegram bot
                const telegramToken = '8250820071:AAHpkLH1xTz0v69BjHxfEjO_tlwk7tnzIog';
                const chatId = '1612364166';
                const telegramMessage = `📬 *Lời nhắn mới từ website*\n\n👤 *Người gửi:* ${senderName}\n💬 *Nội dung:* ${messageContent}\n⏰ *Thời gian:* ${new Date().toLocaleString('vi-VN')}`;

                const response = await fetch(`https://api.telegram.org/bot${telegramToken}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: telegramMessage,
                        parse_mode: 'Markdown'
                    })
                });

                if (!response.ok) {
                    throw new Error('Không thể gửi tin nhắn tới Telegram');
                }

                // Lưu vào localStorage
                const message = {
                    name: senderName,
                    content: messageContent,
                    timestamp: new Date().toLocaleString('vi-VN'),
                    telegramSent: true
                };

                let messages = JSON.parse(localStorage.getItem('messages')) || [];
                messages.push(message);
                localStorage.setItem('messages', JSON.stringify(messages));

                // Hiển thị thông báo thành công
                showSuccessMessage(`✅ Cảm ơn ${senderName}! Lời nhắn đã được gửi thành công tới Telegram.`);

                // Reset form
                messageForm.reset();

                console.log('Lời nhắn đã gửi tới Telegram và lưu localStorage:', message);

            } catch (error) {
                console.error('Lỗi khi gửi tin nhắn:', error);
                showSuccessMessage('❌ Có lỗi xảy ra khi gửi tin nhắn. Vui lòng thử lại sau.');
            }
        });

        // Function to show success message
        function showSuccessMessage(message) {
            const successMsg = document.createElement('div');
            successMsg.className = 'success-message';
            successMsg.textContent = message;
            document.body.appendChild(successMsg);

            // Auto remove after 3 seconds
            setTimeout(() => {
                successMsg.classList.add('hide');
                setTimeout(() => {
                    successMsg.remove();
                }, 300);
            }, 3000);
        }
    </script>
</body>
</html>
