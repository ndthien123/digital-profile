<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Game Bắn Cung Siêu Tốc</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .game-title {
            font-size: 36px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .game-subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 15px;
            min-width: 120px;
            margin: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
        }

        .timer-value {
            color: #ff4757 !important;
        }

        .click-area {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px;
            cursor: pointer;
            transition: all 0.1s ease;
            position: relative;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            user-select: none;
        }

        .click-area:hover {
            transform: scale(1.05);
        }

        .click-area:active {
            transform: scale(0.95);
        }

        .click-area.clicked {
            animation: clickEffect 0.1s ease;
        }

        @keyframes clickEffect {
            0% { transform: scale(1); }
            50% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        .click-icon {
            font-size: 60px;
            color: white;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }

        .click-text {
            color: white;
            font-size: 18px;
            font-weight: 600;
            margin-top: 10px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f1f2f6;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .game-over.show {
            opacity: 1;
            visibility: visible;
        }

        .game-over-title {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .final-score {
            font-size: 48px;
            color: #667eea;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .rating {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
        }

        .particles {
            position: absolute;
            pointer-events: none;
            font-size: 24px;
        }

        .particle {
            position: absolute;
            animation: particleFloat 1s ease-out forwards;
            opacity: 0;
        }

        @keyframes particleFloat {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(0.5);
            }
        }

        @media (max-width: 480px) {
            .game-container {
                padding: 30px 20px;
            }

            .game-title {
                font-size: 28px;
            }

            .click-area {
                width: 150px;
                height: 150px;
            }

            .click-icon {
                font-size: 40px;
            }

            .stat-value {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1 class="game-title">🎯 Game Bắn Cung Siêu Tốc</h1>
        <p class="game-subtitle">Bấm nút càng nhanh càng tốt trong 30 giây!</p>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Điểm số</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Thời gian</div>
                <div class="stat-value timer-value" id="timer">30</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">CPS</div>
                <div class="stat-value" id="cps">0.0</div>
            </div>
        </div>

        <div class="click-area" id="clickArea">
            <div>
                <div class="click-icon">🏹</div>
                <div class="click-text">BẤM TÔI!</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn">🚀 Bắt Đầu</button>
            <button class="btn btn-secondary" id="resetBtn">🔄 Chơi Lại</button>
        </div>

        <div class="game-over" id="gameOver">
            <h2 class="game-over-title">🎉 Chúc mừng!</h2>
            <div class="final-score" id="finalScore">0</div>
            <div class="rating" id="rating">Tuyệt vời!</div>
            <button class="btn btn-primary" id="playAgainBtn">🎮 Chơi Lại</button>
        </div>
    </div>

    <script>
        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        let timerInterval;
        let clickCount = 0;
        let startTime;

        const scoreElement = document.getElementById('score');
        const timerElement = document.getElementById('timer');
        const cpsElement = document.getElementById('cps');
        const clickArea = document.getElementById('clickArea');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const gameOver = document.getElementById('gameOver');
        const finalScore = document.getElementById('finalScore');
        const rating = document.getElementById('rating');
        const playAgainBtn = document.getElementById('playAgainBtn');

        function createParticles(x, y) {
            const particles = ['✨', '⭐', '💫', '🌟'];
            for (let i = 0; i < 5; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.textContent = particles[Math.floor(Math.random() * particles.length)];
                particle.style.left = (x + (Math.random() - 0.5) * 100) + 'px';
                particle.style.top = (y + (Math.random() - 0.5) * 100) + 'px';
                document.body.appendChild(particle);

                setTimeout(() => particle.remove(), 1000);
            }
        }

        function updateCPS() {
            if (gameActive && startTime) {
                const elapsed = (Date.now() - startTime) / 1000;
                const currentCPS = clickCount / elapsed;
                cpsElement.textContent = currentCPS.toFixed(1);
            }
        }

        function getRating(score) {
            if (score >= 500) return "🎯 Thần công! Siêu nhân!";
            if (score >= 400) return "🏹 Cao thủ bắn cung!";
            if (score >= 300) return "⭐ Xuất sắc!";
            if (score >= 200) return "👍 Tốt lắm!";
            if (score >= 100) return "🙂 Cố gắng thêm!";
            return "😅 Thử lại nhé!";
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            clickCount = 0;
            gameActive = true;
            startTime = Date.now();

            scoreElement.textContent = score;
            timerElement.textContent = timeLeft;
            cpsElement.textContent = '0.0';

            clickArea.style.pointerEvents = 'auto';
            startBtn.disabled = true;
            gameOver.classList.remove('show');

            timerInterval = setInterval(() => {
                timeLeft--;
                timerElement.textContent = timeLeft;
                updateCPS();

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            clickArea.style.pointerEvents = 'none';
            startBtn.disabled = false;

            finalScore.textContent = score;
            rating.textContent = getRating(score);
            gameOver.classList.add('show');
        }

        function resetGame() {
            clearInterval(timerInterval);
            gameActive = false;
            score = 0;
            timeLeft = 30;
            clickCount = 0;

            scoreElement.textContent = score;
            timerElement.textContent = timeLeft;
            cpsElement.textContent = '0.0';
            clickArea.style.pointerEvents = 'none';
            startBtn.disabled = false;
            gameOver.classList.remove('show');
        }

        clickArea.addEventListener('click', (e) => {
            if (!gameActive) return;

            score++;
            clickCount++;
            scoreElement.textContent = score;

            clickArea.classList.add('clicked');
            setTimeout(() => clickArea.classList.remove('clicked'), 100);

            createParticles(e.clientX, e.clientY);
            updateCPS();
        });

        startBtn.addEventListener('click', startGame);
        resetBtn.addEventListener('click', resetGame);
        playAgainBtn.addEventListener('click', resetGame);

        // Initialize
        clickArea.style.pointerEvents = 'none';
    </script>
</body>
</html>
